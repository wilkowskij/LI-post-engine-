name: Daily LinkedIn Post

on:
  schedule:
    # 9:00 AM EST (UTC-5) on Tue, Wed, Thu
    # EST (UTC-5): 14:00 UTC | EDT (UTC-4): 14:00 UTC = 10am (still optimal)
    - cron: '0 14 * * 2,3,4'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Override topic (leave blank for smart auto-select)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Preflight — verify required secrets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          echo "Secret presence (values hidden):"
          status=0
          check() {
            if [ -z "$2" ]; then
              echo "  MISSING  $1"
              [ "$3" = "required" ] && status=1
            else
              echo "  present  $1 (${#2} chars)"
            fi
          }
          check ANTHROPIC_API_KEY     "$ANTHROPIC_API_KEY"     required
          check CLOUDINARY_CLOUD_NAME "$CLOUDINARY_CLOUD_NAME"  optional
          check CLOUDINARY_API_KEY    "$CLOUDINARY_API_KEY"     optional
          check CLOUDINARY_API_SECRET "$CLOUDINARY_API_SECRET"  optional
          check BUFFER_ACCESS_TOKEN   "$BUFFER_ACCESS_TOKEN"    optional
          check TAVILY_API_KEY        "$TAVILY_API_KEY"         optional
          if [ "$status" != "0" ]; then
            echo "::error::ANTHROPIC_API_KEY is not set as a repository secret. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run daily post engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_HEADLINE: ${{ secrets.AUTHOR_HEADLINE }}
          POST_TIMEZONE: America/New_York
          POSTING_DAYS: Tue,Wed,Thu
        run: |
          # Automated schedule → generate only (creates GitHub Issue for review)
          # Manual dispatch → full pipeline (generates + schedules to Buffer immediately)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE_FLAG="--generate-only"
          else
            MODE_FLAG="--auto-schedule"
          fi
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            python main.py run-daily $MODE_FLAG --topic "$TOPIC"
          else
            python main.py run-daily $MODE_FLAG
          fi

      - name: Commit post history
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/posts/ output/.review_pending.json || true
          git diff --cached --quiet || git commit -m "chore: add post $(date +%Y-%m-%d) [skip ci]"
          git push || true

      # ── Create GitHub Issue for review (automated schedule runs only) ──
      - name: Create review issue
        if: success() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = {};
            try {
              review = JSON.parse(fs.readFileSync('output/.review_pending.json', 'utf8'));
            } catch (e) {
              console.log('No review file found — skipping issue creation:', e.message);
              return;
            }

            // Ensure the post-review label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'post-review',
                color: '0075ca',
                description: 'LinkedIn post awaiting your review before publishing',
              });
            } catch (_) { /* already exists */ }

            const date = new Date().toISOString().slice(0, 10);
            const scheduleUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/schedule-post.yml`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.run_id }}`;
            const postText = review.text || '(no text generated)';
            const formatLabel = (review.format || 'N/A').replace(/_/g, ' ');
            const postFile = review.post_file || 'latest draft';
            const imageSection = review.image_url
              ? `### Framework Diagram\n\n![Diagram](${review.image_url})\n\n`
              : '';

            const body = [
              `## LinkedIn Post — Ready for Your Review`,
              ``,
              `📅 **Date:** ${date}`,
              `📌 **Topic:** ${review.topic || 'N/A'}`,
              `🎨 **Format:** ${formatLabel}`,
              ``,
              `---`,
              ``,
              `### Post Text`,
              ``,
              `\`\`\``,
              postText,
              `\`\`\``,
              ``,
              imageSection,
              `---`,
              ``,
              `### To publish this post`,
              ``,
              `1. Review the content above — edit the file if needed`,
              `2. Go to **[Actions → Schedule Post](${scheduleUrl})** and click **Run workflow**`,
              `3. Paste the post file path: \`${postFile}\``,
              `4. Close this issue once it's live ✓`,
              ``,
              `> **Post file:** \`${postFile}\``,
              `> Generated by [Run #${{ github.run_number }}](${runUrl})`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📝 Review: ${review.topic || 'LinkedIn post'} — ${date}`,
              body: body,
              labels: ['post-review'],
            });

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-output-${{ github.run_number }}
          path: |
            output/posts/
            output/images/
          retention-days: 90

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily post pipeline failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily LinkedIn post workflow failed.\n\n**Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\nCheck the logs for details. Common causes: expired Buffer token, Cloudinary quota, Anthropic API issue.`,
              labels: ['pipeline-failure']
            });
