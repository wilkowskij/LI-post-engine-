name: Daily LinkedIn Post

on:
  schedule:
    # 8:00 AM CT (UTC-6 winter / UTC-5 summer) — runs Mon-Fri
    # Adjust the hour if your timezone differs from CT:
    #   ET  8am = 13:00 UTC
    #   PT  8am = 16:00 UTC
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Override topic (leave blank for smart auto-select)'
        required: false
        default: ''

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily post generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_HEADLINE: ${{ secrets.AUTHOR_HEADLINE }}
          POST_TIMEZONE: America/Chicago
          POSTING_DAYS: Mon,Tue,Wed,Thu,Fri
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            python main.py run-daily --auto-schedule --topic "$TOPIC"
          else
            python main.py run-daily --auto-schedule
          fi

      - name: Upload generated images as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-output-${{ github.run_number }}
          path: |
            output/posts/
            output/images/
          retention-days: 30
